<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="YMYxij6jy2UuUCWx4wc4FgxMeN9zZDmaFTn_Q8uE9mY" />
  <!-- YouTube API Key: set content to your key to enable the videos section -->
  <meta name="youtube-api-key" content="YOUR_API_KEY_HERE" />
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="public/favicon.svg" />
  <title>ASRock AI</title>
  <meta name="description"
    content="ASRock AI 讓企業 AI 完全在地端基礎設施運行——資料不離開您的環境，主導權完全掌握在您手中。這不是 SaaS，而是您的 AI 工廠。" />
  <meta name="author" content="ASRock AI" />
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
  <link rel="canonical" href="https://allenintaipei.github.io/ASRockAICenter/" />
  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://allenintaipei.github.io/ASRockAICenter/" />
  <meta property="og:title" content="ASRock AI" />
  <meta property="og:description" content="ASRock AI 讓企業 AI 完全在地端基礎設施運行——資料不離開您的環境，主導權完全掌握在您手中。這不是 SaaS，而是您的 AI 工廠。" />
  <meta property="og:image" content="https://allenintaipei.github.io/ASRockAICenter/og-image.png" />
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ASRock AI" />
  <meta name="twitter:description" content="ASRock AI 讓企業 AI 完全在地端基礎設施運行——資料不離開您的環境，主導權完全掌握在您手中。這不是 SaaS，而是您的 AI 工廠。" />
  <meta name="twitter:image" content="https://allenintaipei.github.io/ASRockAICenter/og-image.png" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app-root">

    <!-- Language Toggle -->
    <div class="lang-toggle">
      <button class="lang-btn" id="lang-toggle-btn">
        <span>EN</span>
      </button>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle">
      <button class="theme-btn" id="theme-toggle-btn">
        <span>Light</span>
      </button>
    </div>

    <div class="container">

      <!-- Header -->
      <header>
        <h1 data-i18n="header.title">ASRock AI</h1>
        <h2 data-i18n="header.subtitle"></h2>
        <p class="tagline" data-i18n="header.taglines.0"></p>
        <p class="tagline" data-i18n="header.taglines.1"></p>
        <p class="tagline" data-i18n="header.taglines.2"></p>
      </header>

      <!-- Audience Navigation -->
      <section class="section audience-nav-section" id="audience-nav">
        <div class="audience-nav-grid" id="audience-nav-grid">
          <!-- populated by main.js -->
        </div>
      </section>

      <!-- Apps Section -->
      <section class="section audience-hidden" id="apps">
        <h2 data-i18n="appsSection.title"></h2>
        <p class="section-subtitle" data-i18n="appsSection.subtitle"></p>
        <div class="apps-grid" id="apps-grid">
          <!-- populated by main.js -->
        </div>
      </section>

      <!-- Process Section -->
      <section class="section audience-hidden" id="process">
        <h2 data-i18n="processSection.title"></h2>
        <p class="section-subtitle" data-i18n="processSection.subtitle"></p>
        <div class="process-steps" id="process-steps">
          <!-- populated by main.js -->
        </div>
      </section>

      <!-- Success Stories Section -->
      <section class="section audience-hidden" id="success-stories">
        <h2 data-i18n="successStoriesSection.title"></h2>
        <p class="section-subtitle" data-i18n="successStoriesSection.subtitle"></p>
        <div class="success-stories-grid" id="success-stories-grid">
          <!-- populated by main.js -->
        </div>
      </section>

      <!-- Resources Section -->
      <section class="section audience-hidden" id="resources">
        <h2 data-i18n="resources.title"></h2>
        <p class="section-subtitle" data-i18n="resources.subtitle"></p>
        <div class="links-grid" id="resources-grid">
          <!-- populated by main.js -->
        </div>
      </section>

      <!-- Developer Courses Section -->
      <section class="section audience-hidden" id="courses">
        <h2 data-i18n="coursesSection.title"></h2>
        <p class="section-subtitle" data-i18n="coursesSection.subtitle"></p>
        <div class="links-grid" id="courses-grid">
          <!-- populated by main.js -->
        </div>
      </section>

      <!-- Blogs Section -->
      <section class="section audience-hidden" id="blogs">
        <h2 data-i18n="blogsSection.title"></h2>
        <p class="section-subtitle" data-i18n="blogsSection.subtitle"></p>
        <div class="links-grid" id="blogs-grid">
          <!-- populated by main.js -->
        </div>
      </section>

      <!-- YouTube Section -->
      <section class="section youtube-section hidden audience-hidden" id="youtube-section">
        <h2 data-i18n="youtubeSection.title"></h2>
        <p class="section-subtitle" data-i18n="youtubeSection.subtitle"></p>
        <div class="videos-grid" id="videos-grid">
          <!-- populated by main.js -->
        </div>
        <div style="text-align:center; margin-top:2rem;">
          <a href="#" target="_blank" rel="noreferrer" id="videos-more"
            style="color:var(--accent); text-decoration:none; font-size:14px;"></a>
        </div>
      </section>

      <!-- Contact Section -->
      <footer class="section contact-section" id="contact">
        <h2 data-i18n="contact.title"></h2>
        <div class="contact-cards" id="contact-cards">
          <!-- populated by main.js -->
        </div>
      </footer>

    </div><!-- /.container -->
  </div><!-- /.app-root -->

  <script src="locales.js"></script>
  <script src="main.js"></script>
</body>

</html>
