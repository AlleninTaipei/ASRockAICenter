<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>ASRock AI — OG Image</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #FAF8F3;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #2D2923;
    }

    /* Subtle warm dot grid */
    .dot-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(45,41,35,0.07) 1px, transparent 1px);
      background-size: 36px 36px;
    }

    /* Warm radial glows */
    .glow-tl {
      position: absolute;
      top: -180px;
      left: -180px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(204,120,92,0.10) 0%, transparent 65%);
    }
    .glow-br {
      position: absolute;
      bottom: -180px;
      right: -120px;
      width: 560px;
      height: 560px;
      background: radial-gradient(circle, rgba(124,139,94,0.10) 0%, transparent 65%);
    }

    /* Corner marks — editorial style */
    .corner {
      position: absolute;
      width: 36px;
      height: 36px;
    }
    .corner::before,
    .corner::after {
      content: '';
      position: absolute;
      background: rgba(204,120,92,0.45);
    }
    .corner::before { width: 100%; height: 1.5px; }
    .corner::after  { width: 1.5px; height: 100%; }

    .corner-tl { top: 40px; left: 40px; }
    .corner-tl::before { top: 0; left: 0; }
    .corner-tl::after  { top: 0; left: 0; }

    .corner-tr { top: 40px; right: 40px; transform: scaleX(-1); }
    .corner-tr::before { top: 0; left: 0; }
    .corner-tr::after  { top: 0; left: 0; }

    .corner-bl { bottom: 40px; left: 40px; transform: scaleY(-1); }
    .corner-bl::before { top: 0; left: 0; }
    .corner-bl::after  { top: 0; left: 0; }

    .corner-br { bottom: 40px; right: 40px; transform: scale(-1); }
    .corner-br::before { top: 0; left: 0; }
    .corner-br::after  { top: 0; left: 0; }

    /* Horizontal accent lines */
    .line-top,
    .line-bottom {
      position: absolute;
      left: 88px;
      right: 88px;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(204,120,92,0.30) 20%,
        rgba(204,120,92,0.30) 80%,
        transparent 100%);
    }
    .line-top    { top: 88px; }
    .line-bottom { bottom: 88px; }

    /* Main content */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      border: 1px solid rgba(204,120,92,0.40);
      border-radius: 999px;
      padding: 7px 22px;
      margin-bottom: 42px;
      background: rgba(204,120,92,0.06);
    }
    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #CC785C;
    }
    .badge-text {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: #CC785C;
    }

    /* Logo wordmark */
    .logo {
      display: flex;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .logo-asrock {
      font-size: 86px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #2D2923;
      line-height: 1;
    }
    .logo-ai {
      font-size: 86px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      color: #CC785C;
    }

    /* Divider */
    .divider {
      width: 72px;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, #CC785C, #7C8B5E);
      margin: 26px 0 30px;
    }

    /* Subtitle */
    .subtitle {
      font-size: 27px;
      font-weight: 400;
      color: #2D2923;
      text-align: center;
      letter-spacing: 0.005em;
      margin-bottom: 14px;
    }

    /* Tagline */
    .tagline {
      font-size: 18px;
      font-weight: 300;
      color: rgba(45,41,35,0.52);
      text-align: center;
      letter-spacing: 0.01em;
    }

    /* URL strip */
    .url-strip {
      position: absolute;
      bottom: 46px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
    }
    .url-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(204,120,92,0.55);
    }
    .url-text {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.07em;
      color: rgba(45,41,35,0.38);
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="dot-grid"></div>
  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <!-- Corner marks -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Accent lines -->
  <div class="line-top"></div>
  <div class="line-bottom"></div>

  <!-- Main content -->
  <div class="content">
    <div class="badge">
      <div class="badge-dot"></div>
      <span class="badge-text">Enterprise AI Platform</span>
    </div>

    <div class="logo">
      <span class="logo-asrock">ASRock&nbsp;</span>
      <span class="logo-ai">AI</span>
    </div>

    <div class="divider"></div>

    <p class="subtitle">Enterprise AI Transformation</p>
    <p class="tagline">on your infrastructure, on your terms.</p>
  </div>

  <!-- URL strip -->
  <div class="url-strip">
    <div class="url-dot"></div>
    <span class="url-text">allenintaipei.github.io/ASRockAICenter</span>
  </div>

</body>
</html>
